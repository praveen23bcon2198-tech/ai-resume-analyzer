<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analysis Result</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
    body{
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:linear-gradient(135deg,#1e3c72,#2a5298);
      padding:20px;
    }
    .box{
      width:700px;
      max-width:95%;
      background:rgba(255,255,255,0.12);
      backdrop-filter:blur(14px);
      border-radius:25px;
      padding:35px;
      color:white;
      box-shadow:0 8px 30px rgba(0,0,0,0.25);
      animation:fadeIn 0.8s ease;
    }
    @keyframes fadeIn{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
    h2{text-align:center;font-size:32px;margin-bottom:20px;}
    .score-circle{
      width:130px;height:130px;border-radius:50%;margin:20px auto;
      display:flex;justify-content:center;align-items:center;
      background:conic-gradient(#00ff99 calc({{ score }} * 1%), rgba(255,255,255,0.15) 0);
      position:relative;
    }
    .score-circle::before{
      content:'';position:absolute;width:95px;height:95px;border-radius:50%;background:#1f4068;
    }
    .score-text{position:relative;font-size:28px;font-weight:700;z-index:2;}
    .suggestion{
      text-align:center;margin:20px 0;padding:15px;border-radius:15px;
      background:rgba(255,255,255,0.12);
    }
    .section{margin-top:25px;}
    .section h3{margin-bottom:12px;font-size:22px;}
    .skills-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
      gap:12px;
    }
    .skill{
      padding:10px;
      border-radius:12px;
      text-align:center;
      font-weight:500;
    }
    .found{background:rgba(0,255,153,0.2);border:1px solid #00ff99;}
    .missing{background:rgba(255,77,77,0.2);border:1px solid #ff4d4d;}
    .back-btn{
      display:block;text-align:center;margin-top:30px;text-decoration:none;
      color:white;background:linear-gradient(to right,#00c6ff,#0072ff);
      padding:12px 25px;border-radius:30px;font-weight:600;
      width:max-content;margin-left:auto;margin-right:auto;
    }
    .back-btn:hover{transform:scale(1.05);}
  </style>
</head>
<body>
  <div class="box">
    <h2>📊 Resume Analysis Result</h2>

    <div class="score-circle">
      <div class="score-text">{{ score }}%</div>
    </div>

    <div class="suggestion">
      <strong>AI Suggestion:</strong> {{ suggestion }}
    </div>

    <div class="section">
      <h3 style="color:#00ff99;">✅ Skills Found</h3>
      <div class="skills-grid">
        {% for skill in found_skills %}
          <div class="skill found">{{ skill }}</div>
        {% endfor %}
      </div>
    </div>

    <div class="section">
      <h3 style="color:#ff4d4d;">❌ Missing Skills</h3>
      <div class="skills-grid">
        {% for skill in missing_skills %}
          <div class="skill missing">{{ skill }}</div>
        {% endfor %}
      </div>
    </div>

    <a href="/" class="back-btn">🔄 Analyze Another Resume</a>
  </div>
</body>
</html>
