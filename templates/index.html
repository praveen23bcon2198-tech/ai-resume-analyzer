<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Resume Analyzer</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f7fb;
            text-align: center;
            padding: 50px;
        }

        .container {
            background: white;
            padding: 30px;
            width: 400px;
            margin: auto;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h1 {
            color: #2c3e50;
        }

        input, button {
            margin-top: 15px;
            padding: 10px;
            width: 90%;
        }

        button {
            background: #007bff;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>AI Resume Analyzer</h1>
        <p>Upload your resume (PDF or DOCX)</p>

        <form action="/analyze" method="post" enctype="multipart/form-data">
            <input type="file" name="resume" required>
            <br>
            <button type="submit">Analyze Resume</button>
        </form>
    </div>

</body>
</html>
